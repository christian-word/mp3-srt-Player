<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Lyric Player</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* Зона загрузки */
        #drop-zone { position: absolute; inset: 10px; border: 2px dashed #333; display: flex; align-items: center; justify-content: center; border-radius: 20px; color: #666; font-size: 18px; text-align: center; padding: 20px; z-index: 100; background: rgba(5,5,5,0.95); transition: 0.3s; }
        
        #lyrics-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; padding: 20px; box-sizing: border-box; overflow: hidden; }
        
        /* Адаптивный текст */
        #lyrics { 
            font-size: 8vw; /* Размер зависит от ширины экрана */
            text-align: center; font-weight: 900; 
            background: linear-gradient(180deg, #fff 0%, #ffd700 50%, #ff8c00 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.4));
            max-width: 100%; line-height: 1.2; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0; transform: scale(0.9);
            word-wrap: break-word;
        }
        #lyrics.active { opacity: 1; transform: scale(1); }
        
        /* Визуализатор */
        #freq-canvas { position: absolute; bottom: 140px; left: 0; width: 100%; height: 80px; opacity: 0.7; pointer-events: none; }
        
        /* Панель управления (увеличенная для мобильных) */
        #ui { min-height: 140px; background: #111; display: none; flex-direction: column; align-items: center; padding: 15px; border-top: 1px solid #222; box-sizing: border-box; }
        .controls { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 600px; }
        
        #play-btn { 
            background: linear-gradient(45deg, #ffd700, #ff8c00); 
            border: none; width: 65px; height: 65px; border-radius: 50%; 
            cursor: pointer; font-size: 24px; color: #000; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(255,140,0,0.3);
        }
        
        #waveform-container { position: relative; flex: 1; height: 50px; background: #000; border-radius: 12px; cursor: pointer; overflow: hidden; border: 1px solid #333; }
        #wave-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #progress-cursor { position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: #fff; z-index: 5; pointer-events: none; }

        /* Стили для десктопа (уменьшаем текст) */
        @media (min-width: 768px) {
            #lyrics { font-size: 52px; }
            #ui { min-height: 120px; }
        }
    </style>
</head>
<body>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        Нажмите или перетащите файл <br> (mp3.srt.mp3)
        <input type="file" id="file-input" style="display:none" accept="audio/*">
    </div>
    
    <div id="lyrics-container">
        <canvas id="freq-canvas"></canvas>
        <div id="lyrics"></div>
    </div>

    <div id="ui">
        <div id="filename" style="font-size: 10px; color: #555; margin-bottom: 10px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 90%; text-align: center;"></div>
        <div class="controls">
            <button id="play-btn">▶</button>
            <div id="waveform-container">
                <canvas id="wave-canvas"></canvas>
                <div id="progress-cursor"></div>
            </div>
        </div>
    </div>

    <script>
        const audio = new Audio();
        let audioCtx, analyser, dataArray, source, subtitles = [];
        let isLoaded = false;
        let waveData = [];

        const lyricsDiv = document.getElementById('lyrics');
        const freqCanvas = document.getElementById('freq-canvas');
        const waveCanvas = document.getElementById('wave-canvas');
        const cursor = document.getElementById('progress-cursor');
        const ui = document.getElementById('ui');

        function globalRender() {
            requestAnimationFrame(globalRender);
            if (!isLoaded) return;

            if (audioCtx && !audio.paused) {
                const ctxF = freqCanvas.getContext('2d');
                if (freqCanvas.width !== freqCanvas.clientWidth) {
                    freqCanvas.width = freqCanvas.clientWidth;
                    freqCanvas.height = freqCanvas.clientHeight;
                }
                analyser.getByteFrequencyData(dataArray);
                ctxF.clearRect(0, 0, freqCanvas.width, freqCanvas.height);
                const barWidth = freqCanvas.width / dataArray.length;
                for (let i = 0; i < dataArray.length; i++) {
                    const val = dataArray[i];
                    const barH = (val / 255) * freqCanvas.height;
                    ctxF.fillStyle = `hsla(${(i/dataArray.length)*180+200}, 80%, 50%, ${val/255})`;
                    ctxF.fillRect(i * barWidth, freqCanvas.height - barH, barWidth - 2, barH);
                }
            }

            if (waveData.length > 0) {
                const ctxW = waveCanvas.getContext('2d');
                if (waveCanvas.width !== waveCanvas.clientWidth) {
                    waveCanvas.width = waveCanvas.clientWidth;
                    waveCanvas.height = waveCanvas.clientHeight;
                }
                const w = waveCanvas.width;
                const h = waveCanvas.height;
                const progressPos = (audio.currentTime / (audio.duration || 1)) * w;
                const amp = h / 2;
                ctxW.clearRect(0, 0, w, h);
                for (let i = 0; i < waveData.length; i++) {
                    ctxW.fillStyle = (i < progressPos) ? "#ff8c00" : "#444";
                    const peak = waveData[i];
                    ctxW.fillRect(i, (1 + peak.min) * amp, 1, Math.max(1, (peak.max - peak.min) * amp));
                }
                cursor.style.left = progressPos + 'px';
            }
        }
        globalRender();

        async function processAudioBuffer(buffer, name) {
            const view = new DataView(buffer);
            let audioData = buffer;
            try {
                const magic = new TextDecoder().decode(buffer.slice(buffer.byteLength - 6));
                if (magic === "MP3SRT") {
                    const srtSize = view.getUint32(buffer.byteLength - 10, true);
                    const srtOffset = buffer.byteLength - 10 - srtSize;
                    const srtText = new TextDecoder('windows-1251').decode(buffer.slice(srtOffset, buffer.byteLength - 10));
                    subtitles = parseSRT(srtText);
                    audioData = buffer.slice(0, srtOffset);
                }
            } catch(err) { console.log("SRT error or missing"); }

            audio.src = URL.createObjectURL(new Blob([audioData]));
            await calculateWave(audioData);
            document.getElementById('drop-zone').style.display = 'none';
            ui.style.display = 'flex';
            document.getElementById('filename').innerText = name;
            isLoaded = true;
        }

        // Автозагрузка
        fetch('mp3.srt.mp3').then(r => r.ok && r.arrayBuffer()).then(b => b && processAudioBuffer(b, 'mp3.srt.mp3')).catch(() => {});

        // Выбор файла через кнопку (для мобильных)
        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (file) processAudioBuffer(await file.arrayBuffer(), file.name);
        };

        // Drag & Drop
        document.body.ondragover = e => { e.preventDefault(); document.getElementById('drop-zone').classList.add('active'); };
        document.body.ondrop = async (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) processAudioBuffer(await file.arrayBuffer(), file.name);
        };

        async function calculateWave(data) {
            const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuf = await tempCtx.decodeAudioData(data.slice(0));
            const raw = audioBuf.getChannelData(0);
            const w = waveCanvas.clientWidth || window.innerWidth;
            waveData = [];
            const step = Math.ceil(raw.length / w);
            for (let i = 0; i < w; i++) {
                let min = 1, max = -1;
                for (let j = 0; j < step; j++) {
                    const d = raw[i * step + j];
                    if (d < min) min = d; if (d > max) max = d;
                }
                waveData.push({min, max});
            }
            tempCtx.close();
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64; // Меньше для мобильных (экономия ресурсов)
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        audio.ontimeupdate = () => {
            const time = audio.currentTime;
            const current = subtitles.find(s => time >= s.start && time <= s.end);
            if (current) {
                if (lyricsDiv.innerText !== current.text) {
                    lyricsDiv.innerText = current.text;
                    lyricsDiv.classList.add('active');
                }
            } else { lyricsDiv.classList.remove('active'); }
        };

        function parseSRT(data) {
            const blocks = data.replace(/\r/g, '').trim().split(/\n\s*\n/);
            return blocks.map(block => {
                const lines = block.split('\n');
                const timeMatch = lines[1]?.match(/(\d+):(\d+):(\d+),(\d+) --> (\d+):(\d+):(\d+),(\d+)/);
                if (timeMatch) {
                    const toS = (m, off) => parseInt(m[off+1])*3600 + parseInt(m[off+2])*60 + parseInt(m[off+3]) + parseInt(m[off+4])/1000;
                    return { start: toS(timeMatch, 0), end: toS(timeMatch, 4), text: lines.slice(2).join(' ') };
                }
            }).filter(i => i);
        }

        document.getElementById('play-btn').onclick = () => { 
            initAudio(); 
            audio.paused ? audio.play() : audio.pause(); 
            document.getElementById('play-btn').innerText = audio.paused ? '▶' : 'II'; 
        };

        // Перемотка кликом/касанием
        document.getElementById('waveform-container').addEventListener('click', (e) => {
            if (isLoaded) audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration;
        });
    </script>
</body>
</html>
